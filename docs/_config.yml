title: Surge — User Research
description: >-
  User research for Surge — a performance nutrition tracking app for athletes.
  Published record of an in-progress project following the ua-framework
  three-stage process.

# Files at the top level of docs/ are the UA documents. List them with
# their generated paths so links from index.md work.
include:
  - UA0-PROJECT-STATUS.md

# Exclude things that should never end up on the published site even if
# they happen to land in docs/.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle

# Use relative URLs so the site works both on github.io and on a custom
# domain without reconfiguration.
relative_permalinks: false

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Default front-matter: every page gets a title from its front-matter or
# falls back to the H1.
defaults:
  - scope:
      path: ""
    values:
      layout: default
